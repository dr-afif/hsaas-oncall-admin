<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSAAS Roster Manager</title>
    <link rel="stylesheet" href="style.css">
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <button id="hamburgerBtn" class="hamburger-btn" onclick="toggleMobileDrawer()">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="header-title-group">
                    <h2 style="margin:0; color: var(--primary);">HSAAS Roster</h2>
                    <span id="activeDeptName" class="dept-title-inline"></span>
                </div>
            </div>
            
            <div id="drawerOverlay" class="drawer-overlay" onclick="toggleMobileDrawer()"></div>
            
            <div id="navContainer" class="nav-container">
                <div class="user-info">
                    <div id="admin-dept-switcher" class="hidden">
                        <select id="activeDeptId"></select>
                    </div>
                    <span id="userEmail" class="user-email-text"></span>
                    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
                </div>
                <nav id="mainNav">
                    <a href="#roster" data-view="roster">Roster</a>
                    <a href="#contacts" data-view="contacts">Contacts</a>
                    <a href="#slots" data-view="slots">Slot Types</a>
                    <a href="#audit" data-view="audit">Audit</a>
                    <a href="#admin" data-view="admin" class="hidden">Admin</a>
                    <a href="#" onclick="showHelpModal(); return false;">Help</a>
                </nav>
            </div>
        </header>

        <main id="appContent">
            <!-- Dynamic content injected here -->
        </main>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="modal-overlay">
        <div id="modalContent" class="modal"></div>
    </div>

    <!-- Notification -->
    <div id="notification"></div>

    <script src="js/config.js"></script>
    <script src="js/app_config.js?v=1.0.4"></script>
    <script src="js/supabase-client.js?v=1.0.3-cachebuster"></script>
    <script src="js/auth.js?v=1.0.3-cachebuster"></script>
    <script src="js/roster.js?v=1.0.3-cachebuster"></script>
    <script src="js/contacts.js?v=1.0.3-cachebuster"></script>
    <script src="js/slots.js?v=1.0.3-cachebuster"></script>
    <script src="js/audit.js?v=1.0.3-cachebuster"></script>
    <script src="js/admin.js?v=1.0.3-cachebuster"></script>
    <script src="js/app.js?v=1.0.3-cachebuster"></script>
</body>

</html>
